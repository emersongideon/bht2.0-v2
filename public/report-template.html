<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICONIC Brand Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--blue50:#eff6ff;--blue100:#dbeafe;--blue900:#1e3a8a;
  --g900:#111827;--g800:#1f2937;--g700:#374151;--g600:#4b5563;
  --g500:#6b7280;--g400:#9ca3af;--g300:#d1d5db;--g200:#e5e7eb;
  --g100:#f3f4f6;--g50:#f9fafb;
  --green:#059669;--red:#dc2626;--amber:#d97706;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:var(--g900);-webkit-font-smoothing:antialiased}
.wrap{max-width:48rem;margin:0 auto;padding:4rem 2rem}

/* selector */
.sel{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:4rem}
.sel-btn{padding:.375rem 1rem;border-radius:9999px;font-size:.75rem;font-weight:500;border:none;cursor:pointer;background:var(--g100);color:var(--g500);font-family:inherit;transition:background .15s}
.sel-btn:hover{background:var(--g200)}
.sel-btn.on{background:var(--blue);color:#fff}

/* header */
.hd-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:3rem}
.hd-left{display:flex;align-items:center;gap:.5rem}
.lbl{font-size:.75rem;font-weight:500;color:var(--blue);text-transform:uppercase;letter-spacing:.1em}
.sep{font-size:.75rem;color:var(--g300)}
.per{font-size:.75rem;color:var(--g400)}
.cat{font-size:.75rem;color:var(--g400)}
.brand-name{font-size:3rem;font-weight:700;letter-spacing:-.02em;margin-bottom:.75rem;line-height:1.1}
.brand-sub{font-size:1.125rem;color:var(--g500);font-weight:300}
.stats{display:flex;align-items:flex-end;margin-top:2.5rem;border-bottom:1px solid var(--g200);padding-bottom:2rem}
.sc{text-align:center;padding:1rem 1.5rem}
.sc-val{font-size:2.25rem;font-weight:600;margin-bottom:.25rem}
.sc-lbl{font-size:.75rem;font-weight:500;color:var(--g400);text-transform:uppercase;letter-spacing:.1em}
.sc-sub{font-size:.75rem;color:var(--g400);margin-top:.25rem}
.sdiv{width:1px;height:3rem;background:var(--g100);align-self:center}

/* sections */
.sec{margin-bottom:3.5rem}
.sec-title{font-size:.75rem;font-weight:500;color:var(--g400);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1.5rem}
.lead-p1{font-size:1.125rem;color:var(--g700);line-height:1.75;margin-bottom:1.25rem}
.lead-p2{font-size:1rem;color:var(--g500);line-height:1.75}

/* charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.chart-wrap{background:var(--g50);border-radius:.5rem;padding:1rem;height:11rem}
.chart-sub{font-size:.75rem;font-weight:500;color:var(--g400);text-transform:uppercase;letter-spacing:.1em;margin-bottom:1rem}
.bar-wrap{background:var(--g50);border-radius:.5rem;padding:1.5rem;margin-bottom:2rem}

/* dims */
.dim-row{display:flex;gap:1.5rem;margin-bottom:2rem}
.dim-left{flex-shrink:0;width:4rem;padding-top:.25rem}
.dim-num{font-size:1.5rem;font-weight:700;color:var(--g900)}
.dim-d{font-size:.75rem;font-weight:500}
.dim-d.p{color:var(--green)}.dim-d.n{color:var(--red)}
.dim-right{flex:1;border-left:1px solid var(--g200);padding-left:1.5rem}
.dim-hd{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.25rem}
.dim-key{font-size:.75rem;font-weight:500;color:var(--blue)}
.dim-label{font-size:.875rem;font-weight:600;color:var(--g800)}
.dim-rank{font-size:.75rem;color:var(--g400);margin-left:auto}
.dim-txt{font-size:.875rem;color:var(--g500);line-height:1.625}

/* comp */
.comp-row{display:flex;align-items:center;gap:1rem;padding:.75rem 1rem;border-radius:.5rem;margin-bottom:.5rem;background:var(--g50)}
.comp-row.self{background:var(--blue50);border:1px solid var(--blue100)}
.comp-rk{font-size:.75rem;font-weight:500;color:var(--g400);width:1.5rem}
.comp-br{font-size:.875rem;flex:1;color:var(--g700)}
.comp-br.self{font-weight:600;color:var(--blue900)}
.comp-sc{font-size:.875rem;font-weight:600;color:var(--g800);width:3rem;text-align:right}
.comp-dl{font-size:.75rem;font-weight:500;width:2.5rem;text-align:right}
.comp-dl.p{color:var(--green)}.comp-dl.n{color:var(--red)}
.comp-track{width:7rem;height:.375rem;background:var(--g200);border-radius:9999px;overflow:hidden}
.comp-fill{height:100%;border-radius:9999px}
.comp-txt{font-size:.875rem;color:var(--g500);line-height:1.625;margin-top:1.5rem}

/* watch */
.watch-box{background:var(--g50);border-radius:.5rem;padding:2rem}
.watch-title{font-size:.875rem;font-weight:600;color:var(--g800);margin-bottom:.75rem}
.watch-p{font-size:.875rem;color:var(--g600);line-height:1.625;margin-bottom:1rem}
.watch-p:last-child{margin-bottom:0}

/* empty */
.empty{display:flex;align-items:center;justify-content:center;height:60vh;font-size:1rem;color:var(--g400);font-family:'Inter',sans-serif}

/* footer */
.ft{display:flex;justify-content:space-between;align-items:center;padding:2rem 0;border-top:1px solid var(--g200)}
.ft-iconic{font-size:.75rem;font-weight:500;color:var(--blue);text-transform:uppercase;letter-spacing:.1em}
.ft-q{font-size:.75rem;color:var(--g400)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ── Data is injected by the host React page via window.__REPORT_BRANDS__ ──────
// To test standalone, replace the line below with your own brands array.
const brands = window.__REPORT_BRANDS__ || [];

// ── Chart helpers ─────────────────────────────────────────────────────────────

function areaChart(data, w, h) {
  const pl=34,pr=8,pt=10,pb=24;
  const cw=w-pl-pr, ch=h-pt-pb;
  const scores = data.map(d=>d.score);
  const raw_min = Math.min(...scores), raw_max = Math.max(...scores);
  const yMin = Math.floor((raw_min-5)/5)*5;
  const yMax = Math.ceil((raw_max+5)/5)*5;
  const xs = (i)=> pl + (i/(data.length-1))*cw;
  const ys = (v)=> pt + ch - ((v-yMin)/(yMax-yMin))*ch;
  const pts = data.map((d,i)=>[xs(i),ys(d.score)]);
  const line = pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
  const area = line+` L${pts[pts.length-1][0]},${pt+ch} L${pts[0][0]},${pt+ch} Z`;
  const ticks = [yMin, Math.round((yMin+yMax)/2), yMax];
  let s = `<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient></defs>`;
  ticks.forEach(v=>{
    const y=ys(v);
    s+=`<line x1="${pl}" y1="${y}" x2="${pl+cw}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;
    s+=`<text x="${pl-4}" y="${y+4}" text-anchor="end" font-size="10" fill="#9ca3af">${v}</text>`;
  });
  s+=`<path d="${area}" fill="url(#ag)"/>`;
  s+=`<path d="${line}" fill="none" stroke="#2563eb" stroke-width="2"/>`;
  pts.forEach(p=>{ s+=`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#2563eb"/>`; });
  data.forEach((d,i)=>{
    s+=`<text x="${xs(i)}" y="${pt+ch+17}" text-anchor="middle" font-size="11" fill="#9ca3af">${d.month}</text>`;
  });
  return s+'</svg>';
}

function radarChart(data, size) {
  const cx=size/2, cy=size/2+2, r=size*0.34, lr=size*0.46;
  const n=data.length;
  const ang=(i)=>(i/n)*2*Math.PI - Math.PI/2;
  const px=(i,rad)=> cx+rad*Math.cos(ang(i));
  const py=(i,rad)=> cy+rad*Math.sin(ang(i));
  let s=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" overflow="visible" xmlns="http://www.w3.org/2000/svg">`;
  [.33,.66,1].forEach(lv=>{
    const pts=data.map((_,i)=>`${px(i,r*lv)},${py(i,r*lv)}`).join(' ');
    s+=`<polygon points="${pts}" fill="none" stroke="#e5e7eb" stroke-width="1"/>`;
  });
  data.forEach((_,i)=>{ s+=`<line x1="${cx}" y1="${cy}" x2="${px(i,r)}" y2="${py(i,r)}" stroke="#e5e7eb" stroke-width="1"/>`; });
  const dpts=data.map((d,i)=>{const ratio=d.value/100;return `${px(i,r*ratio)},${py(i,r*ratio)}`;}).join(' ');
  s+=`<polygon points="${dpts}" fill="#2563eb" fill-opacity=".06" stroke="#2563eb" stroke-width="1.5"/>`;
  data.forEach((d,i)=>{
    const ratio=d.value/100;
    s+=`<circle cx="${px(i,r*ratio)}" cy="${py(i,r*ratio)}" r="2.5" fill="#2563eb"/>`;
    const lx=px(i,lr), ly=py(i,lr);
    const anchor=lx<cx-3?'end':lx>cx+3?'start':'middle';
    s+=`<text x="${lx}" y="${ly+4}" text-anchor="${anchor}" font-size="10" fill="#6b7280" font-family="Inter,sans-serif">${d.attr}</text>`;
  });
  return s+'</svg>';
}

function barChart(data, w, h) {
  const pl=34, pr=10, pt=6, pb=20;
  const bh=13;
  const cw=w-pl-pr, ch=h-pt-pb;
  const gap=(ch - data.length*bh)/(data.length-1);
  let s=`<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">`;
  data.forEach((d,i)=>{
    const y=pt+i*(bh+gap);
    const bw=Math.max(4,(d.score/100)*cw);
    const color=d.score<66?'#fbbf24':'#2563eb';
    s+=`<rect x="${pl}" y="${y}" width="${cw}" height="${bh}" rx="0" fill="#e5e7eb"/>`;
    s+=`<rect x="${pl}" y="${y}" width="${bw}" height="${bh}" rx="4" fill="${color}" fill-opacity=".75"/>`;
    s+=`<text x="${pl-4}" y="${y+bh/2+4}" text-anchor="end" font-size="11" font-weight="500" fill="#6b7280" font-family="Inter,sans-serif">${d.dim}</text>`;
  });
  [0,25,50,75,100].forEach(v=>{
    const x=pl+(v/100)*cw;
    s+=`<text x="${x}" y="${h-4}" text-anchor="middle" font-size="10" fill="#9ca3af">${v}</text>`;
  });
  return s+'</svg>';
}

// ── Render ────────────────────────────────────────────────────────────────────

let selected = 0;

function fmt(n, decimals=1) { return Number(n).toFixed(decimals); }
function fmtDelta(n) { return (n>=0?'+':'')+fmt(n); }
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function render() {
  if (!brands || brands.length === 0) {
    document.getElementById('app').innerHTML = '<div class="empty">No report data available for this week.</div>';
    return;
  }

  const d = brands[selected];

  // Brand selector
  const selHtml = `<div class="sel">${brands.map((b,i)=>
    `<button class="sel-btn${i===selected?' on':''}" data-i="${i}">${escHtml(b.name)}</button>`
  ).join('')}</div>`;

  // Stats
  const deltaColor = d.delta>=0 ? '#059669' : '#dc2626';
  const statsHtml = `
    <div class="stats">
      <div class="sc"><div class="sc-val">${fmt(d.iconicScore)}</div><div class="sc-lbl">ICONIC Score</div></div>
      <div class="sdiv"></div>
      <div class="sc"><div class="sc-val">#${d.rank}</div><div class="sc-lbl">Rank</div><div class="sc-sub">of ${d.totalBrands}</div></div>
      <div class="sdiv"></div>
      <div class="sc"><div class="sc-val" style="color:${deltaColor}">${fmtDelta(d.delta)}</div><div class="sc-lbl">vs. Prior Fortnight</div></div>
    </div>`;

  // Charts
  const chartW = 280, chartH = 144;
  const trendSvg = areaChart(d.trend, chartW, chartH);
  const radarSvg = radarChart(d.radarData, chartH+20);
  const barSvg   = barChart(d.dimensionBars, chartW*2+32, chartH-10);

  // Dimension rows
  const dimsHtml = d.dimensions.map(dim => {
    const dp = dim.delta >= 0;
    return `
    <div class="dim-row">
      <div class="dim-left">
        <div class="dim-num">${fmt(dim.score)}</div>
        <div class="dim-d ${dp?'p':'n'}">${fmtDelta(dim.delta)}</div>
      </div>
      <div class="dim-right">
        <div class="dim-hd">
          <span class="dim-key">${escHtml(dim.key)}</span>
          <span class="dim-label">${escHtml(dim.label)}</span>
          <span class="dim-rank">#${dim.rank} of ${d.totalBrands}</span>
        </div>
        <p class="dim-txt">${escHtml(d.narratives.dims[dim.key] || '')}</p>
      </div>
    </div>`; }).join('');

  // Competitor rows
  const compHtml = d.competitorSnapshot.map(c => {
    const dp = c.delta >= 0;
    return `
    <div class="comp-row${c.self?' self':''}">
      <span class="comp-rk">#${c.rank}</span>
      <span class="comp-br${c.self?' self':''}">${escHtml(c.brand)}</span>
      <span class="comp-sc">${fmt(c.score)}</span>
      <span class="comp-dl ${dp?'p':'n'}">${fmtDelta(c.delta)}</span>
      <div class="comp-track">
        <div class="comp-fill" style="width:${c.score}%;background:${c.self?'#2563eb':'#d1d5db'}"></div>
      </div>
    </div>`; }).join('');

  // Watch items (support any number)
  const watchHtml = (d.narratives.watch || []).map(w =>
    `<p class="watch-p">${escHtml(w)}</p>`
  ).join('');

  const html = `
    ${selHtml}

    <header class="sec" style="margin-bottom:4rem">
      <div class="hd-meta">
        <div class="hd-left">
          <span class="lbl">ICONIC Report</span>
          <span class="sep">/</span>
          <span class="per">${escHtml(d.period)}</span>
        </div>
        <span class="cat">${escHtml(d.category)} &middot; ${escHtml(d.market)}</span>
      </div>
      <h1 class="brand-name">${escHtml(d.name)}</h1>
      <p class="brand-sub">Brand health performance overview</p>
      ${statsHtml}
    </header>

    <section class="sec">
      <p class="lead-p1">${escHtml((d.narratives.lead || [])[0] || '')}</p>
      <p class="lead-p2">${escHtml((d.narratives.lead || [])[1] || '')}</p>
    </section>

    <section class="sec">
      <div class="charts-grid">
        <div>
          <p class="chart-sub">Weekly Trajectory</p>
          <div class="chart-wrap">${trendSvg}</div>
        </div>
        <div>
          <p class="chart-sub">Shape</p>
          <div class="chart-wrap" style="display:flex;align-items:center;justify-content:center;overflow:visible;padding:1rem 2.5rem">${radarSvg}</div>
        </div>
      </div>
    </section>

    <section class="sec">
      <h2 class="sec-title">Dimensions</h2>
      <div class="bar-wrap">${barSvg}</div>
      ${dimsHtml}
    </section>

    <section class="sec">
      <h2 class="sec-title">Competitive Set</h2>
      ${compHtml}
      <p class="comp-txt">${escHtml(d.narratives.competitive || '')}</p>
    </section>

    <section class="sec">
      <div class="watch-box">
        <h2 class="watch-title">What to Watch</h2>
        ${watchHtml}
      </div>
    </section>

    <footer class="ft">
      <span class="ft-iconic">ICONIC</span>
      <span class="ft-q">Quilt.AI</span>
    </footer>`;

  document.getElementById('app').innerHTML = html;

  // Re-attach button listeners
  document.querySelectorAll('.sel-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selected = parseInt(btn.dataset.i);
      render();
      window.scrollTo({top:0,behavior:'smooth'});
    });
  });
}

render();
</script>
</body>
</html>
